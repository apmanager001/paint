<html>
<head>
    <title>Where Community Meets Art</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

</head>
<body>

<div class="container-header">
    <div class="title">
        Community Art
    </div>
    <div class="center">
    <div class="name">
        Name
    </div>
    <div class="moves">
        5
    </div>
    <div class="clock">
            5:00
        </div>
    <div class="mid-header">
        
    <button id="openModal">Take The Reigns</button>

        <div id="myModal" class="modal">
          <div class="modal-content">
            <span class="close">&times;</span>
        
            <form id="usernameForm">
              <label for="username">Username:</label>
              <input type="text" id="username" name="username" required>
              <button type="submit">Submit</button>
            </form>
          </div>
        </div>
    </div></div>
</div>

<div class="container-staging">
<div class="use-staging dropZone" >
   
</div>


<div class="container-shapes">
<div class="shapes dropZone" id="canvas">
    <div class="allShapes" id="square" draggable="true"></div>
    <div class="allShapes" id="rectangle" draggable="true"></div>
    <div class="allShapes" id="circle" draggable="true"></div>
    <div class="allShapes" id="oval" draggable="true"></div>
    <div class="allShapes" id="triangleUp" draggable="true"></div>
    <div class="allShapes" id="triangleDown" draggable="true"></div>
    <div class="allShapes" id="triangleLeft" draggable="true"></div>
    <div class="allShapes" id="triangleRight" draggable="true"></div>
    <div class="allShapes" id="parallelogram" draggable="true"></div>
    <div class="allShapes" id="diamond" draggable="true"></div>
    
</div>
</div></div>
<script src="js/index.js">
</script>

</body>


</html>
